  <script>
    const $ = (id) => document.getElementById(id);
    
    $("publish").addEventListener("click", async () => {
      const status = $("status");
      const fileInput = $("images");
      
      if (fileInput.files.length === 0) {
        status.textContent = "Error: Please select an image.";
        return;
      }

      status.textContent = "Uploading...";
      
      const fd = new FormData();
      fd.append("title", $("title").value.trim());
      fd.append("body", $("body").value.trim());
      // Matches 'image' in create.js; sends the first file
      fd.append("image", fileInput.files[0]); 

      try {
        // Updated path to match functions/api/create.js
        const res = await fetch("/api/create", { 
          method: "POST", 
          body: fd 
        });

        if (!res.ok) {
          const errorText = await res.text();
          status.textContent = "Error: " + errorText;
          return;
        }

        status.textContent = "Successfully Posted!";
        // Reset form
        $("title").value = "";
        $("body").value = "";
        fileInput.value = "";
        
      } catch (err) {
        status.textContent = "Network Error: " + err.message;
      }
    });
  </script>
