<!-- Update the input to allow multiple -->
<input id="images" type="file" accept="image/*" multiple>

<script>
  const $ = (id) => document.getElementById(id);
  
  $("publish").addEventListener("click", async () => {
    const status = $("status");
    const fileInput = $("images");
    
    if (fileInput.files.length === 0) {
      status.textContent = "Error: Select at least one image.";
      return;
    }

    status.textContent = "Uploading album...";
    
    const fd = new FormData();
    fd.append("title", $("title").value.trim());
    fd.append("body", $("body").value.trim());
    
    // Loop through all selected files and add them to FormData
    for (let i = 0; i < fileInput.files.length; i++) {
      fd.append("images", fileInput.files[i]);
    }

    try {
      const res = await fetch("/api/create", { method: "POST", body: fd });
      if (!res.ok) throw new Error(await res.text());

      status.textContent = "Album Posted Successfully!";
      $("title").value = ""; $("body").value = ""; fileInput.value = "";
    } catch (err) {
      status.textContent = "Error: " + err.message;
    }
  });
</script>
